<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Three rectangles sharing one corner, each with its diagonal showing its ratio</title>
  <desc>A 1 to 1 square, a 1 to 2 rectangle, and a 1 to 3 rectangle all anchored at the same bottom-left corner. Each has a diagonal drawn from the shared corner to its far corner, labelled with its ratio. The short side, common to all three, is marked 1.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="80" y="40" width="480" height="160" fill="none" stroke="#888780" stroke-width="0.6" opacity="0.55"/>
  <rect x="80" y="40" width="320" height="160" fill="none" stroke="#888780" stroke-width="0.6" opacity="0.7"/>
  <rect x="80" y="40" width="160" height="160" fill="none" stroke="#888780" stroke-width="0.6" opacity="0.85"/>

  <line x1="80" y1="200" x2="240" y2="40"  stroke="#185FA5" stroke-width="1.4" stroke-linecap="round" opacity="0.95"/>
  <line x1="80" y1="200" x2="400" y2="40"  stroke="#185FA5" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
  <line x1="80" y1="200" x2="560" y2="40"  stroke="#185FA5" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>

  <text x="248" y="36" font-family="sans-serif" font-size="12" fill="#185FA5">1:1</text>
  <text x="408" y="36" font-family="sans-serif" font-size="12" fill="#185FA5">1:2</text>
  <text x="568" y="36" font-family="sans-serif" font-size="12" fill="#185FA5">1:3</text>

  <line x1="60" y1="40"  x2="60" y2="200" stroke="#888780" stroke-width="0.5" opacity="0.6" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="46" y="124" font-family="sans-serif" font-size="12" fill="#888780" text-anchor="end">1</text>

  <line x1="80"  y1="220" x2="240" y2="220" stroke="#888780" stroke-width="0.5" opacity="0.6" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="160" y="236" font-family="sans-serif" font-size="12" fill="#888780" text-anchor="middle">1</text>

  <line x1="80"  y1="252" x2="400" y2="252" stroke="#888780" stroke-width="0.5" opacity="0.6" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="240" y="268" font-family="sans-serif" font-size="12" fill="#888780" text-anchor="middle">2</text>

  <line x1="80"  y1="284" x2="560" y2="284" stroke="#888780" stroke-width="0.5" opacity="0.6" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="320" y="300" font-family="sans-serif" font-size="12" fill="#888780" text-anchor="middle">3</text>

  <text x="340" y="336" font-family="sans-serif" font-size="12" fill="#888780" text-anchor="middle">Same short side, different long sides — the diagonal is the ratio.</text>
</svg>
