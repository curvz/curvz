# Flatpak manifest for Curvz.
#
# Build locally:
#   cd /path/to/curvz
#   flatpak-builder --user --install --force-clean \
#     build-flatpak packaging/flatpak/io.github.curvz.Curvz.yaml
#   flatpak run io.github.curvz.Curvz
#
# Uninstall:
#   flatpak uninstall io.github.curvz.Curvz
#
# First build downloads ~700 MB of GNOME runtime + SDK and compiles nine
# bundled deps (spdlog, Clipper2, cmark, nlohmann_json, and the five-module
# gtkmm-4 binding stack: libsigc++, glibmm, cairomm, pangomm, gtkmm). Expect
# ~10-15 min for the first build on a modern machine; subsequent code-change
# rebuilds are ~30 sec because dep modules are cached.

app-id: io.github.curvz.Curvz
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: curvz

# ── Sandbox holes ─────────────────────────────────────────────────────────────
# Each line is a freedom granted at runtime. Less is better for security.
# Curvz needs:
#   • Display + GPU                   → wayland / X11 fallback / dri
#   • User home for project files     → home
#   • Print via CUPS (PrintManager)   → cups socket
#   • Read host icon themes for the
#     in-app icon library scanner     → xdg-data/icons (user-installed)
#
# s135 m3: removed two impossible mounts that flatpak silently rejects
# because /usr inside the sandbox is reserved for the runtime:
#   --filesystem=/usr/share/icons:ro
#   --filesystem=/usr/local/share/icons:ro
# These produced "Path /usr is reserved" warnings on launch (Ubuntu
# 26.04 day-2 Flatpak validation, s134). Flathub docs confirm: any
# --filesystem path under /usr, /etc, /bin, /lib, /lib32, /lib64, /proc,
# /sbin, /run/flatpak, /run/host has no effect. The runtime's own
# /usr/share/icons (Adwaita etc) is naturally available without a
# mount, since it's inside the sandbox already. Host-installed user
# themes come from xdg-data/icons, which is the common case.
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=home
  - --socket=cups
  - --filesystem=xdg-data/icons:ro

# ── Bundle slimming ───────────────────────────────────────────────────────────
# These paths are stripped from /app after every module finishes building. They
# only matter at compile time — keeping them in the bundle bloats the .flatpak
# without changing runtime behaviour. Standard Flathub idiom; mirrors what
# every gtkmm-4 manifest on Flathub does.
cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/aclocal
  - /share/devhelp
  - /share/doc
  - /share/gir-1.0
  - /share/gtk-doc
  - /share/man
  - /share/pkgconfig
  - '*.a'
  - '*.la'

# ── Modules ───────────────────────────────────────────────────────────────────
# Built in order. Each installs to /app inside the sandbox; subsequent modules
# (and Curvz's own find_package calls) discover them there.
modules:

  # spdlog — header-only-ish logging, but we want the compiled lib so all of
  # Curvz's translation units share one logger instance. Versions match the
  # FetchContent fallback in CMakeLists.txt so behaviour is identical to a
  # native build.
  - name: spdlog
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSPDLOG_BUILD_SHARED=ON
      - -DSPDLOG_BUILD_EXAMPLE=OFF
      - -DSPDLOG_BUILD_TESTS=OFF
    sources:
      - type: archive
        url: https://github.com/gabime/spdlog/archive/refs/tags/v1.15.3.tar.gz
        sha256: 15a04e69c222eb6c01094b5c7ff8a249b36bb22788d72519646fb85feb267e67

  # Clipper2 — Angus Johnson's polygon clipping library. Boost license. Used
  # by BooleanOpsClipper.cpp as a fallback / cross-check against the
  # Sederberg-Nishita Bézier clipping path.
  - name: clipper2
    buildsystem: cmake-ninja
    subdir: CPP
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCLIPPER2_UTILS=OFF
      - -DCLIPPER2_EXAMPLES=OFF
      - -DCLIPPER2_TESTS=OFF
    sources:
      - type: archive
        url: https://github.com/AngusJohnson/Clipper2/archive/refs/tags/Clipper2_1.5.4.tar.gz
        sha256: 9d8a35a29d04cd1b7b45f542c0ba48015feece1210036ea9e4efaad3140af4b0

  # cmark — CommonMark parser, used by HelpWindow to render the bundled
  # markdown manual. Static link is fine; it's small and we want a single
  # self-contained binary inside the Flatpak.
  #
  # `builddir: true` forces flatpak-builder to configure cmark from a sibling
  # build directory rather than the source root. Without it, cmark's
  # CMakeLists hits its in-source-build guard and aborts.
  - name: cmark
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMARK_TESTS=OFF
      - -DBUILD_SHARED_LIBS=OFF
    sources:
      - type: archive
        url: https://github.com/commonmark/cmark/archive/refs/tags/0.31.1.tar.gz
        sha256: 3da93db5469c30588cfeb283d9d62edfc6ded9eb0edc10a4f5bbfb7d722ea802

  # nlohmann/json — header-only JSON library used throughout Curvz for project
  # file (.curvz) read/write, swatch/style serialisation, and round-trip
  # fidelity tests. Header-only but the CMake project still installs config
  # files so Curvz's `find_package(nlohmann_json)` resolves the in-sandbox
  # copy at /app instead of trying to FetchContent from GitHub (which fails
  # because the sandbox has no network during the compile phase).
  #
  # Version matches the FetchContent fallback in CMakeLists.txt exactly.
  # Tests are off (we don't need them) but JSON_Install defaults ON for a
  # top-level build, which is what we want.
  - name: nlohmann_json
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DJSON_BuildTests=OFF
    sources:
      - type: archive
        url: https://github.com/nlohmann/json/releases/download/v3.11.3/json.tar.xz
        sha256: d6c65aca6b1ed68e7a182f4757257b107ae403032760ed6ef121c9d55e81757d

  # ── gtkmm-4 C++ binding stack ────────────────────────────────────────────────
  # The org.gnome.Sdk//47 runtime ships GTK4 + glib + cairo + pango (the C
  # libraries) but NOT the C++ binding stack. Curvz is a gtkmm-4.0 application,
  # so we build the bindings ourselves: libsigc++ → glibmm → cairomm → pangomm
  # → gtkmm. Versions are pinned to the GNOME 47-era stable releases (Sept
  # 2024), which is when GNOME 47 itself shipped — keeping bindings and the
  # GTK4 runtime contemporaneous.
  #
  # Why these specific versions:
  #   libsigc++-3.6.0  - sigc++-3.0 ABI; required by glibmm and cairomm
  #   glibmm-2.82.0    - glibmm-2.68 ABI; matches glib 2.82 in runtime 47
  #   cairomm-1.18.0   - cairomm-1.16 ABI; from cairographics.org (not GNOME)
  #   pangomm-2.54.0   - pangomm-2.48 ABI; matches pango 1.54
  #   gtkmm-4.16.0     - gtkmm-4.0 ABI; pairs with GTK 4.16 in runtime 47
  #
  # All five are meson-built. We disable docs/tests/examples to cut build time
  # by ~60% — flatpak-builder has to compile the whole stack from source on
  # every clean build, so this is the difference between a 5-min and 15-min
  # rebuild after `--force-clean`.
  #
  # `config-opts` here are MESON options (`-Dfoo=value` form), not CMake flags.

  - name: libsigc++
    buildsystem: meson
    config-opts:
      - -Dbuild-documentation=false
      - -Dbuild-examples=false
      - -Dbuild-tests=false
      - -Dbenchmark=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libsigc++/3.6/libsigc++-3.6.0.tar.xz
        sha256: c3d23b37dfd6e39f2e09f091b77b1541fbfa17c4f0b6bf5c89baef7229080e17

  - name: glibmm
    buildsystem: meson
    sources:
      - type: archive
        url: https://download.gnome.org/sources/glibmm/2.82/glibmm-2.82.0.tar.xz
        sha256: 38684cff317273615c67b8fa9806f16299d51e5506d9b909bae15b589fa99cb6

  - name: cairomm
    buildsystem: meson
    config-opts:
      - -Dbuild-documentation=false
      - -Dbuild-examples=false
      - -Dbuild-tests=false
    sources:
      - type: archive
        url: https://www.cairographics.org/releases/cairomm-1.18.0.tar.xz
        sha256: b81255394e3ea8e8aa887276d22afa8985fc8daef60692eb2407d23049f03cfb

  - name: pangomm
    buildsystem: meson
    config-opts:
      - -Dbuild-documentation=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/pangomm/2.54/pangomm-2.54.0.tar.xz
        sha256: 4a5b1fd1b7c47a1af45277ea82b5abeaca8e08fb10a27daa6394cf88d74e7acf

  - name: gtkmm
    buildsystem: meson
    config-opts:
      - -Dbuild-documentation=false
      - -Dbuild-demos=false
      - -Dbuild-tests=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/gtkmm/4.16/gtkmm-4.16.0.tar.xz
        sha256: 3b23fd3abf8fb223b00e9983b6010af2db80e38c89ab6994b8b6230aa85d60f9

  # ── Curvz ────────────────────────────────────────────────────────────────────
  # Curvz itself. `type: dir, path: ../..` points at the repo root from this
  # file's location (packaging/flatpak/manifest.yaml → ../.. = repo root).
  # When Flathub eventually builds this, that source becomes a git URL +
  # commit ref; for local development the dir source is right.
  #
  # `build-options.env` sets CC/CXX before cmake runs. The Curvz CMakeLists
  # reads ENV{CC}/ENV{CXX} as a way to skip its default-to-clang block, so
  # this is what makes Curvz build with the SDK's GCC inside the sandbox
  # while still defaulting to clang on the native dev machine.
  - name: curvz
    buildsystem: cmake-ninja
    build-options:
      env:
        CC: gcc
        CXX: g++
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: ../..
